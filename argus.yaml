agent:
  bash_timeout: 30
  max_dispatch_workers: 5
  max_iterations: 15
  max_iterations_per_agent:
    challenger: 8
    coder: 30
    explorer: 12
  parallel_audit: true
  use_worktrees: false
  worktree_dir: .argus/worktrees
api:
  base_url: null
  max_retries: 3
  provider: anthropic
  timeout: 60
context:
  compaction_model: claude-haiku-4-5-20251001
  compaction_threshold: 500
  max_context_injection_pct: 0.3
  max_history_tokens: 50000
models:
  bug_auditor: claude-haiku-4-5-20251001
  challenger: claude-haiku-4-5-20251001
  coder: claude-haiku-4-5-20251001
  explorer: claude-haiku-4-5-20251001
  orchestrator: claude-haiku-4-5-20251001
  performance_auditor: claude-haiku-4-5-20251001
  security_auditor: claude-haiku-4-5-20251001
  test_auditor: claude-haiku-4-5-20251001
safety:
  allowed_write_paths:
  - .
  blocked_commands:
  - rm -rf /
  - rm -rf ~
  - sudo
  - mkfs
  - '> /dev/sda'
  - chmod 777
  - ':(){:|:&};:'
  review_patterns:
  - 'rm '
  - pip install
  - git push
  - git reset --hard
  - docker
  - kill
  - shutdown
token_budget:
  dollar_hard_cap: 5.0
  dollar_soft_cap: 4.0
  per_agent:
    bug_auditor: 50000
    challenger: 50000
    coder: 200000
    explorer: 100000
    orchestrator: 100000
    performance_auditor: 30000
    security_auditor: 50000
    test_auditor: 30000
    worker: 30000
  total_hard_cap: 500000
  total_soft_cap: 400000
  warning_threshold: 0.8
