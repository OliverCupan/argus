# Argus Configuration

models:
  orchestrator: claude-haiku-4-5-20251001
  challenger: claude-haiku-4-5-20251001
  coder: claude-haiku-4-5-20251001
  explorer: claude-3-5-haiku-20241022
  security_auditor: claude-haiku-4-5-20251001
  bug_auditor: claude-haiku-4-5-20251001
  performance_auditor: claude-3-5-haiku-20241022
  test_auditor: claude-3-5-haiku-20241022

api:
  provider: anthropic  # anthropic | openai
  base_url: null       # override for custom endpoints
  max_retries: 3
  timeout: 60

token_budget:
  total_hard_cap: 500000     # tokens — kill agent immediately
  total_soft_cap: 400000     # tokens — warn, let agent wind down gracefully
  dollar_hard_cap: 5.00      # USD — kill immediately (set 0 to disable)
  dollar_soft_cap: 4.00      # USD — warn (set 0 to disable)
  warning_threshold: 0.8     # legacy 80% warning threshold
  per_agent:
    orchestrator: 100000
    challenger: 50000
    coder: 150000
    explorer: 30000
    security_auditor: 50000
    bug_auditor: 50000
    performance_auditor: 30000
    test_auditor: 30000

context:
  max_history_tokens: 50000
  compaction_threshold: 1000        # Tier 1/2 boundary — outputs below this pass through
  compaction_model: claude-3-5-haiku-20241022
  max_context_injection_pct: 0.30   # max 30% of history budget for injected context

safety:
  blocked_commands:
    - "rm -rf /"
    - "rm -rf ~"
    - "sudo"
    - "mkfs"
    - "> /dev/sda"
    - "chmod 777"
    - ":(){:|:&};:"
  review_patterns:
    - "rm "
    - "pip install"
    - "git push"
    - "git reset --hard"
    - "docker"
    - "kill"
    - "shutdown"
  allowed_write_paths:
    - "."  # project directory only

agent:
  max_iterations: 15          # max ReAct loop iterations per agent
  bash_timeout: 30            # seconds
  parallel_audit: true        # run audit agents in parallel
  use_worktrees: false        # opt-in git worktree isolation for Coder
  worktree_dir: .argus/worktrees
